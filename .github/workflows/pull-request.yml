name: Pull Request Checks

on:
  pull_request:
    branches:
      - master

jobs:
  pr-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install pnpm 🔧
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: CI=true pnpm i

      - name: Run TypeScript typecheck
        run: pnpm run check

      - name: Run Lint Checker
        run: pnpm run lint

      - name: Run Build
        run: pnpm run build

