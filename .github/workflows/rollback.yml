name: Rollback to Tag

on:
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: 'Tag to rollback to (e.g. 1.4.2)'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine rollback commit
        id: rollback
        run: |
          git fetch --tags
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          COMMIT=$(git rev-list -n 1 "${{ inputs.rollback_tag }}")
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

      - name: Determine next patch version
        id: version
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.rollback.outputs.package_version }}"
          NEXT_PATCH=$((PATCH + 1))
          NEW_TAG_VERSION="$MAJOR.$MINOR.$NEXT_PATCH"
          NEW_TAG="${NEW_TAG_VERSION}-rollback-${{inputs.rollback_tag}}-$(date +%Y%m%d%H%M%S)"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create rollback tag
        run: |
          git tag "${{ steps.version.outputs.new_tag }}" \
            "${{ steps.rollback.outputs.commit }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Viam Build 🚀
        uses: viamrobotics/build-action@v1.7
        with:
          version: ${{ steps.version.outputs.new_tag }}
          ref: ${{ steps.rollback.outputs.commit }}
          key-id: ${{ secrets.viam_key_id }}
          key-value: ${{ secrets.viam_key_value }}
